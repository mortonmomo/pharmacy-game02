<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MindAR Target 產生器｜第一段 AR 卡</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; max-width: 900px; margin: 32px auto; padding: 0 18px; line-height: 1.65; color: #122033; }
    code { background: #eef3f8; padding: 2px 6px; border-radius: 6px; }
    button { padding: 10px 14px; border-radius: 10px; border: 0; background: #1359d8; color: white; font-weight: 700; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .box { border: 1px solid #d7e2ef; padding: 16px; border-radius: 16px; background: #fbfdff; }
    #log { white-space: pre-wrap; background:#081426; color:#d7f8ff; padding:14px; border-radius:12px; min-height:110px; }
    .warn { background:#fff7e6; border:1px solid #ffd280; padding:12px 14px; border-radius:12px; }
  </style>
</head>
<body>
  <h1>MindAR Target 產生器｜第一段 AR 卡</h1>

  <div class="warn">
    <strong>若剛剛出現「MINDAR is not defined」：</strong><br>
    代表 MindAR 編譯器的外部 JS 沒有載入成功。這一版會自動嘗試 jsDelivr 與 unpkg 兩個來源，並在下方顯示載入狀態。
  </div>

  <p>請選擇 <code>assets/target_card_front.png</code>。產生完成後，下載的檔案請命名為 <code>first-card.mind</code>，並放到 <code>targets/</code> 資料夾。</p>

  <div class="box">
    <input id="file" type="file" accept="image/*" />
    <button id="compile" disabled>載入編譯器中……</button>
  </div>

  <h2>狀態</h2>
  <div id="log">正在載入 MindAR 編譯器……</div>

  <script>
    const CDN_LIST = [
      "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js",
      "https://unpkg.com/mind-ar@1.2.5/dist/mindar-image.prod.js"
    ];

    const logBox = document.getElementById("log");
    const compileBtn = document.getElementById("compile");
    const fileInput = document.getElementById("file");

    function setLog(s) { logBox.textContent = s; }
    function log(s) { logBox.textContent += "\n" + s; }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = () => resolve(src);
        script.onerror = () => reject(new Error("無法載入：" + src));
        document.head.appendChild(script);
      });
    }

    async function loadMindAR() {
      for (const src of CDN_LIST) {
        try {
          log("嘗試載入：" + src);
          await loadScript(src);
          await new Promise(r => setTimeout(r, 300));

          // MindAR 可能掛在 window.MINDAR；用 window 檢查比較穩。
          if (window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.Compiler) {
            log("MindAR 編譯器載入成功。");
            compileBtn.disabled = false;
            compileBtn.textContent = "產生 first-card.mind";
            return true;
          } else {
            log("這個來源已載入，但沒有找到 window.MINDAR.IMAGE.Compiler。");
          }
        } catch (e) {
          log(e.message);
        }
      }

      compileBtn.disabled = true;
      compileBtn.textContent = "編譯器載入失敗";
      log("\n全部來源都失敗。\n請確認：\n1. 目前電腦可以連上網路。\n2. 瀏覽器沒有擋 CDN。\n3. 不要用太嚴格的公司/學校網路。\n\n可改用：把整個資料夾先上傳到 GitHub Pages / Netlify，再從 HTTPS 頁面打開這個產生器。");
      return false;
    }

    compileBtn.addEventListener("click", async () => {
      setLog("開始讀取圖片……");
      const file = fileInput.files[0];
      if (!file) {
        log("請先選擇 assets/target_card_front.png");
        return;
      }

      if (!(window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.Compiler)) {
        log("MindAR 編譯器仍未載入，因此無法產生 .mind。請重新整理或改用 HTTPS 頁面開啟。");
        return;
      }

      const img = new Image();
      img.src = URL.createObjectURL(file);
      await img.decode();
      log(`圖片尺寸：${img.width} × ${img.height}`);

      try {
        const compiler = new window.MINDAR.IMAGE.Compiler();
        log("正在編譯 image target，可能需要 10–60 秒。請不要關閉頁面。");
        await compiler.compileImageTargets([img], (progress) => {
          setLog(`編譯中：${Math.round(progress * 100)}%`);
        });

        const exportedBuffer = await compiler.exportData();
        const blob = new Blob([exportedBuffer], {type: "application/octet-stream"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "first-card.mind";
        a.click();

        setLog("完成。\n請把下載的 first-card.mind 放到 targets/ 資料夾。\n接著部署整個專案，再用手機開 index.html 掃描 target_card_front.png。");
      } catch (e) {
        log("失敗：" + e.message);
        console.error(e);
      }
    });

    loadMindAR();
  </script>
</body>
</html>
