<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>非 AR 預覽｜緊急求救訊號</title>
<style>
  body { margin:0; background:#081426; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:system-ui,"Noto Sans TC",sans-serif; }
  .stage { position:relative; width:min(96vw,1280px); aspect-ratio:16/9; overflow:hidden; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.5); background:#000; }
  .stage img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .overlay { opacity:0; animation-fill-mode:forwards; pointer-events:none; }
  #alert { animation: alertPulse 12s linear infinite; }
  #holo { object-fit:contain; transform:scale(.48) translate(42%, -5%); animation: fadeIn 0.6s 1.2s forwards, holoFloat 2s 1.2s infinite ease-in-out; }
  #scan { animation: scanPulse 8s 1.2s infinite; }
  #msg { animation: fadeIn 0.5s 3s forwards, fadeOut 0.5s 8.5s forwards; object-fit:contain; transform:scale(.72) translateY(21%); }
  #q { animation: fadeIn 0.45s 6.5s forwards, fadeOut 0.35s 9s forwards; object-fit:contain; transform:scale(.43) translate(-50%, -85%); }
  #r { animation: fadeIn 0.45s 9s forwards; object-fit:contain; transform:scale(.38) translate(55%, 75%); }
  @keyframes fadeIn { to { opacity:1; } }
  @keyframes fadeOut { to { opacity:0; } }
  @keyframes alertPulse { 0%,100%{opacity:.18} 10%{opacity:.85} 20%{opacity:.18} 30%{opacity:.8} 45%{opacity:.15} 60%{opacity:.7} 80%{opacity:.22} }
  @keyframes scanPulse { 0%,100%{opacity:.05} 50%{opacity:.28} }
  @keyframes holoFloat { 0%,100%{ transform:scale(.48) translate(42%, -5%);} 50%{ transform:scale(.50) translate(42%, -9%);} }
</style>
</head>
<body>
<div class="stage">
  <img src="./assets/target_card_front.png">
  <img id="alert" class="overlay" src="./assets/alert_red_flash.png">
  <img id="holo" class="overlay" src="./assets/slimeking_hologram.png">
  <img id="scan" class="overlay" src="./assets/hologram_scanline.png">
  <img id="msg" class="overlay" src="./assets/distress_message_box.png">
  <img id="q" class="overlay" src="./assets/dialog_kenbao_question.png">
  <img id="r" class="overlay" src="./assets/dialog_kenbao_response.png">
</div>
</body>
</html>
